<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good morning! — WDYD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',system-ui,sans-serif;background:#111827;color:#d1d5db;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .container{text-align:center;padding:3rem;max-width:480px;animation:fadeIn .6s ease-out}
    .mascot{position:relative;width:260px;margin:0 auto 2.5rem;animation:bob 3s ease-in-out infinite;transform-origin:50% 90%}
    .mascot svg{width:100%;height:auto;display:block;filter:drop-shadow(0 16px 48px rgba(201,169,106,.3)) drop-shadow(0 4px 12px rgba(92,124,250,.2))}
    .mascot::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:60%;height:20px;background:radial-gradient(ellipse,rgba(201,169,106,.18) 0%,transparent 70%);border-radius:50%;animation:shadow-pulse 3s ease-in-out infinite}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(1.5deg)}50%{transform:translateY(-2px) rotate(0deg)}75%{transform:translateY(-10px) rotate(-1.5deg)}}
    @keyframes shadow-pulse{0%,100%{opacity:.6;transform:translateX(-50%) scaleX(1)}50%{opacity:.3;transform:translateX(-50%) scaleX(.85)}}
    .sparkle{position:absolute;animation:twinkle 2s ease-in-out infinite}
    .sparkle:nth-child(2){top:8%;left:10%;animation-delay:0s}
    .sparkle:nth-child(3){top:15%;right:8%;animation-delay:.7s}
    .sparkle:nth-child(4){bottom:25%;left:5%;animation-delay:1.3s}
    @keyframes twinkle{0%,100%{opacity:0;transform:scale(.5) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
    .greeting{font-size:1.1rem;color:#9ca3af;margin-bottom:.5rem}
    .main-text{font-size:1.8rem;font-weight:800;color:#C9A96A;margin-bottom:.5rem;line-height:1.2}
    .sub-text{font-size:.9rem;color:#6b7280;margin-bottom:2rem}
    .typing{display:inline}.typing::after{content:'|';animation:cursor .8s step-end infinite;color:#C9A96A}
    .start-btn{display:inline-flex;align-items:center;gap:8px;background:#C9A96A;color:#111827;font-weight:700;font-size:1rem;padding:14px 32px;border:none;border-radius:14px;cursor:pointer;transition:all .2s;text-decoration:none}
    .start-btn:hover{background:#b5955a;transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,169,106,.3)}
    .start-btn:active{transform:scale(.97)}
    .skip-btn{display:block;margin:1rem auto 0;background:none;border:none;color:#4b5563;font-size:.8rem;cursor:pointer;padding:8px}
    .skip-btn:hover{color:#9ca3af}
    .particles{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;overflow:hidden}
    .particle{position:absolute;width:3px;height:3px;background:#C9A96A;border-radius:50%;opacity:.15;animation:float linear infinite}
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes wave{0%,100%{transform:rotate(0deg)}15%{transform:rotate(3deg)}30%{transform:rotate(-3deg)}45%{transform:rotate(2deg)}60%{transform:rotate(0deg)}}
    @keyframes cursor{50%{opacity:0}}
    @keyframes float{from{transform:translateY(100vh) rotate(0);opacity:0}10%{opacity:.15}90%{opacity:.15}to{transform:translateY(-10px) rotate(360deg);opacity:0}}
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <div class="mascot">
      <svg viewBox="0 0 280 310" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Cream knit body color -->
          <radialGradient id="knitGrad" cx="45%" cy="38%" r="58%">
            <stop offset="0%" stop-color="#F5ECD7"/>
            <stop offset="60%" stop-color="#E8DFC8"/>
            <stop offset="100%" stop-color="#D9CEAD"/>
          </radialGradient>
          <radialGradient id="knitHead" cx="48%" cy="40%" r="55%">
            <stop offset="0%" stop-color="#F5ECD7"/>
            <stop offset="100%" stop-color="#E5DCCA"/>
          </radialGradient>
          <!-- Silver horn -->
          <linearGradient id="hornGrad" x1="30%" y1="0%" x2="70%" y2="100%">
            <stop offset="0%" stop-color="#E8E8EE"/>
            <stop offset="30%" stop-color="#C8C8D4"/>
            <stop offset="60%" stop-color="#D8D8E2"/>
            <stop offset="100%" stop-color="#B0B0BE"/>
          </linearGradient>
          <!-- Dark navy shirt -->
          <radialGradient id="shirtGrad" cx="50%" cy="35%" r="60%">
            <stop offset="0%" stop-color="#1E2A4A"/>
            <stop offset="100%" stop-color="#141E36"/>
          </radialGradient>
          <!-- Gold logo text -->
          <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#D4B96A"/>
            <stop offset="50%" stop-color="#C9A96A"/>
            <stop offset="100%" stop-color="#B89D5A"/>
          </linearGradient>
          <!-- Knit texture pattern -->
          <pattern id="knitTex" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
            <circle cx="4" cy="4" r="3.2" fill="none" stroke="#D6CCB4" stroke-width=".5" opacity=".3"/>
          </pattern>
          <pattern id="knitTexHead" x="0" y="0" width="7" height="7" patternUnits="userSpaceOnUse">
            <circle cx="3.5" cy="3.5" r="2.8" fill="none" stroke="#D6CCB4" stroke-width=".45" opacity=".25"/>
          </pattern>
          <!-- Horn sparkle -->
          <radialGradient id="hornSparkle" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="white" stop-opacity=".7"/>
            <stop offset="100%" stop-color="white" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <!-- === SITTING BODY === -->
        <ellipse cx="140" cy="200" rx="82" ry="85" fill="url(#knitGrad)"/>
        <ellipse cx="140" cy="200" rx="82" ry="85" fill="url(#knitTex)"/>

        <!-- Legs (sitting forward, round stubby) -->
        <ellipse cx="100" cy="278" rx="34" ry="20" fill="url(#knitGrad)"/>
        <ellipse cx="100" cy="278" rx="34" ry="20" fill="url(#knitTex)"/>
        <ellipse cx="180" cy="278" rx="34" ry="20" fill="url(#knitGrad)"/>
        <ellipse cx="180" cy="278" rx="34" ry="20" fill="url(#knitTex)"/>

        <!-- === DARK NAVY T-SHIRT === -->
        <path d="M68 158 Q72 132 100 127 Q118 142 140 142 Q162 142 180 127 Q208 132 212 158 L214 238 Q214 255 196 258 L84 258 Q66 255 66 238 Z" fill="url(#shirtGrad)"/>
        <!-- Neckline -->
        <path d="M100 127 Q118 144 140 144 Q162 144 180 127" stroke="#0D1526" stroke-width="1.5" fill="none"/>
        <!-- Shirt bottom hem -->
        <path d="M78 252 Q140 248 202 252" stroke="#0D1526" stroke-width="1" fill="none" opacity=".4"/>

        <!-- Logo: [UP] box icon -->
        <rect x="96" y="178" width="18" height="14" rx="2" fill="none" stroke="url(#logoGold)" stroke-width="1.3"/>
        <text x="105" y="189" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-weight="700" font-size="8" fill="url(#logoGold)">UP</text>
        <!-- Logo: "upscale ai" text -->
        <text x="122" y="189.5" font-family="'Inter',system-ui,sans-serif" font-weight="600" font-size="11" fill="url(#logoGold)">upscale ai</text>

        <!-- === HEAD (big round cream knit) === -->
        <ellipse cx="140" cy="98" rx="68" ry="62" fill="url(#knitHead)"/>
        <ellipse cx="140" cy="98" rx="68" ry="62" fill="url(#knitTexHead)"/>
        <!-- Subtle shading under chin -->
        <ellipse cx="140" cy="135" rx="40" ry="10" fill="#D2C8B2" opacity=".2"/>

        <!-- Ears (pointy, cream, sticking up) -->
        <path d="M82 62 Q68 28 78 20 Q88 28 95 55 Z" fill="url(#knitGrad)"/>
        <path d="M85 55 Q74 32 80 26 Q87 32 92 50 Z" fill="#E8DFC8" opacity=".5"/>
        <path d="M198 62 Q212 28 202 20 Q192 28 185 55 Z" fill="url(#knitGrad)"/>
        <path d="M195 55 Q206 32 200 26 Q193 32 188 50 Z" fill="#E8DFC8" opacity=".5"/>

        <!-- === SILVER SPARKLY HORN === -->
        <path d="M140 5 L128 52 Q140 46 152 52 Z" fill="url(#hornGrad)"/>
        <!-- Horn sparkle flecks -->
        <circle cx="136" cy="18" r="2" fill="url(#hornSparkle)"/>
        <circle cx="142" cy="28" r="1.5" fill="url(#hornSparkle)"/>
        <circle cx="135" cy="36" r="1.8" fill="url(#hornSparkle)"/>
        <circle cx="144" cy="14" r="1.2" fill="url(#hornSparkle)"/>
        <circle cx="138" cy="44" r="1.3" fill="url(#hornSparkle)"/>
        <!-- Horn ridges -->
        <path d="M133 40 Q140 36 147 40" stroke="#A8A8B6" stroke-width=".8" fill="none" opacity=".4"/>
        <path d="M134 32 Q140 28 146 32" stroke="#A8A8B6" stroke-width=".8" fill="none" opacity=".4"/>
        <path d="M136 24 Q140 20 144 24" stroke="#A8A8B6" stroke-width=".8" fill="none" opacity=".4"/>

        <!-- === EYES (small black beads) === -->
        <circle cx="118" cy="95" r="5" fill="#1a1a1a"/>
        <circle cx="162" cy="95" r="5" fill="#1a1a1a"/>
        <!-- Tiny bead shine -->
        <circle cx="120" cy="93" r="1.5" fill="white" opacity=".6"/>
        <circle cx="164" cy="93" r="1.5" fill="white" opacity=".6"/>

        <!-- Subtle nose bump -->
        <ellipse cx="140" cy="106" rx="5" ry="3" fill="#DDD4BE" opacity=".5"/>

        <!-- === LEFT ARM (resting, cream knit) === -->
        <ellipse cx="58" cy="190" rx="24" ry="35" fill="url(#knitGrad)" transform="rotate(25 58 190)"/>
        <ellipse cx="58" cy="190" rx="24" ry="35" fill="url(#knitTex)" transform="rotate(25 58 190)"/>
        <!-- Sleeve edge -->
        <path d="M70 158 Q60 168 55 162" stroke="#0D1526" stroke-width="1.5" fill="none" opacity=".5"/>

        <!-- === RIGHT ARM (waving, cream knit) === -->
        <g>
          <ellipse cx="222" cy="190" rx="24" ry="35" fill="url(#knitGrad)" transform="rotate(-25 222 190)">
            <animateTransform attributeName="transform" type="rotate" values="-25 222 190;-60 212 168;-25 222 190;-65 210 165;-25 222 190" dur="1.6s" repeatCount="indefinite" keyTimes="0;0.2;0.5;0.7;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
          </ellipse>
          <ellipse cx="222" cy="190" rx="24" ry="35" fill="url(#knitTex)" transform="rotate(-25 222 190)">
            <animateTransform attributeName="transform" type="rotate" values="-25 222 190;-60 212 168;-25 222 190;-65 210 165;-25 222 190" dur="1.6s" repeatCount="indefinite" keyTimes="0;0.2;0.5;0.7;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
          </ellipse>
          <!-- Sleeve edge -->
          <path d="M210 158 Q220 168 225 162" stroke="#0D1526" stroke-width="1.5" fill="none" opacity=".5"/>
        </g>
      </svg>
      <!-- Floating sparkles (silver to match horn) -->
      <svg class="sparkle" width="16" height="16" viewBox="0 0 16 16"><polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#D0D0DE" opacity=".7"/></svg>
      <svg class="sparkle" width="12" height="12" viewBox="0 0 16 16"><polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#C9A96A" opacity=".6"/></svg>
      <svg class="sparkle" width="10" height="10" viewBox="0 0 16 16"><polygon points="8,0 10,6 16,8 10,10 8,16 6,10 0,8 6,6" fill="#D0D0DE" opacity=".5"/></svg>
    </div>
    <p class="greeting" id="greeting"></p>
    <h1 class="main-text">What do you do<span class="typing"></span></h1>
    <p class="sub-text">Let's get today's work logged.</p>
    <button class="start-btn" onclick="window.parent.postMessage('close-greeting','*')">Let's go →</button>
    <button class="skip-btn" onclick="window.parent.postMessage('close-greeting','*')">Not now</button>
  </div>
  <script>
    const hour=new Date().getHours();let g='Hey Priyanka!';
    if(hour<6)g='Up early, Priyanka?';else if(hour<12)g='Good morning, Priyanka!';
    else if(hour<17)g='Good afternoon, Priyanka!';else if(hour<21)g='Good evening, Priyanka!';
    else g='Burning midnight oil, Priyanka?';
    document.getElementById('greeting').textContent=g;
    const c=document.getElementById('particles');
    for(let i=0;i<20;i++){const p=document.createElement('div');p.className='particle';
    p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';
    p.style.animationDelay=Math.random()*10+'s';p.style.width=p.style.height=(2+Math.random()*3)+'px';
    c.appendChild(p)}setTimeout(()=>window.close(),300000);
  </script>
</body>
</html>
